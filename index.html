<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marina · 15 Anos</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Lato', sans-serif;
  background:#0d0608;
  color:white;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}
.hero h1{
  font-family:'Cinzel';
  font-size:60px;
  color:#c9a84c;
}
.hero p{
  opacity:0.7;
}

/* GALERIA */
.gallery{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:20px;
}
.gallery img{
  width:100%;
  border-radius:12px;
  transition:0.4s;
}
.gallery img:hover{
  transform:scale(1.05);
}

/* FORM */
.form{
  max-width:400px;
  margin:40px auto;
  padding:20px;
  background:rgba(255,255,255,0.05);
  border-radius:16px;
}
input, select{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:none;
}
button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:30px;
  background:#8b1a1a;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  background:#c0392b;
}

/* BOTÃO WHATS FIXO */
.whats{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:16px;
  border-radius:50%;
  font-size:20px;
  text-decoration:none;
}

/* ANIMAÇÃO */
.fade{
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}
.fade.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Marina</h1>
  <p>15 Anos · 25 Julho 2026</p>
</section>

<!-- GALERIA -->
<section class="gallery fade">
  <img src="img/foto1.jpg">
  <img src="img/foto2.jpg">
  <img src="img/foto3.jpg">
  <img src="img/foto4.jpg">
</section>

<!-- FORM -->
<section class="form fade">

<input type="text" id="nome" placeholder="Seu nome">

<select id="quantidade">
  <option>Somente eu</option>
  <option>2 pessoas</option>
  <option>3 pessoas</option>
  <option>4 pessoas</option>
</select>

<select id="sexo" onchange="mostrarPe()">
  <option value="">Sexo</option>
  <option value="Masculino">Masculino</option>
  <option value="Feminino">Feminino</option>
</select>

<select id="pe" style="display:none;">
  <option>33/34</option>
  <option>35/36</option>
  <option>37/38</option>
  <option>39/40</option>
</select>

<select id="confirmacao">
  <option value="Sim">Confirmo presença</option>
  <option value="Não">Não poderei ir</option>
</select>

<button onclick="enviar()">CONFIRMAR PRESENÇA</button>

</section>

<!-- BOTÃO WHATS -->
<a class="whats" href="https://wa.me/5551980540658" target="_blank">💬</a>

<script>

// mostrar tamanho do pé
function mostrarPe(){
  let sexo = document.getElementById("sexo").value;
  let pe = document.getElementById("pe");

  pe.style.display = (sexo === "Feminino") ? "block" : "none";
}

// enviar whatsapp
function enviar(){

  let nome = document.getElementById("nome").value;
  let quantidade = document.getElementById("quantidade").value;
  let sexo = document.getElementById("sexo").value;
  let pe = document.getElementById("pe").value;
  let confirmacao = document.getElementById("confirmacao").value;

  if(!nome){
    alert("Digite seu nome");
    return;
  }

  if(!sexo){
    alert("Selecione o sexo");
    return;
  }

  let msg = `*Confirmação - Marina 15 Anos*\n\n`;
  msg += `Nome: ${nome}\n`;
  msg += `Pessoas: ${quantidade}\n`;
  msg += `Sexo: ${sexo}\n`;

  if(sexo === "Feminino"){
    msg += `Tamanho do pé: ${pe}\n`;
  }

  msg += `Presença: ${confirmacao}`;

  let url = `https://wa.me/5551980540658?text=${encodeURIComponent(msg)}`;

  window.open(url, "_blank");
}

// animação ao rolar
const els = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
  els.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 50){
      el.classList.add('show');
    }
  });
});

</script>

</body>
</html>
